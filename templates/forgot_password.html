{% extends "base.html" %}

{% block content %}

<div class="auth-page">

    <div class="auth-card">
        <div class="auth-header">
            <p class="eyebrow">Password Help</p>
            <h1>忘記密碼</h1>
            <p class="page-subtitle">
                Cadouka 目前使用 LINE 綁定帳號來重設密碼。
            </p>
        </div>

        <div class="forgot-box">
            <p>
                如果你的 LINE 已經綁定 Cadouka 帳號，請到 Cadouka 咔都 輸入：
            </p>

            <div class="line-bind-code compact" style="margin: 12px 0;">
                忘記密碼
            </div>

            <p>
                系統會直接傳送一組 30 分鐘有效的密碼重設連結給你。
            </p>

            <p class="sub-text">
                如果你還沒有綁定 LINE，且已經忘記密碼，請聯絡管理員協助重設。
            </p>
        </div>

        <div class="auth-footer">
            想起密碼了？
            <a href="/login">回到登入</a>
        </div>
    </div>

</div>

{% endblock %}
