{% extends "base.html" %}

{% block content %}

<div class="auth-page">

    <div class="auth-card">
        <div class="auth-header">
            <p class="eyebrow">Password Help</p>
            <h1>忘記密碼</h1>
            <p class="page-subtitle">
                請輸入綁定的 Email，我們會寄送密碼重設連結。
            </p>
        </div>

        <form action="/forgot-password" method="post" class="auth-form">
            <label>Email / Gmail</label>
            <input
                type="email"
                name="email"
                placeholder="請輸入你綁定的 Email"
                required
            >

            <button type="submit" class="btn-add auth-submit">
                寄送重設連結
            </button>
        </form>

        <div class="auth-footer">
            想起密碼了？
            <a href="/login">回到登入</a>
        </div>
    </div>

</div>

{% endblock %}
