{% extends "base.html" %}

{% block content %}

<div class="auth-page">

    <div class="auth-card">
        <div class="auth-header">
            <p class="eyebrow">Password Help</p>
            <h1>忘記密碼</h1>
            <p class="page-subtitle">
                目前 Cadouka 尚未啟用 Email 自動重設密碼功能。
            </p>
        </div>

        <div class="forgot-box">
            <p>
                為了保護帳號安全，目前不能直接在這裡重設密碼。
            </p>

            <p>
                如果你忘記密碼，請聯絡系統管理員協助重設。
            </p>
        </div>

        <div class="auth-footer">
            想起密碼了？
            <a href="/login">回到登入</a>
        </div>
    </div>

</div>

{% endblock %}
