{% extends "base.html" %}

{% block content %}

<a href="/cards/{{ card.id }}" class="back-link">← 回到卡牌明細</a>

<h1>編輯卡牌資料</h1>

<form action="/cards/{{ card.id }}/edit" method="post" class="form-card">

    <h2>基本資料</h2>

    <label>卡牌名稱 *</label>
    <input type="text" name="card_name" value="{{ card.card_name }}" required>

    <label>PSA 卡號</label>
    <input type="text" name="card_number" placeholder="可選填 PSA 卡號" value="{{ card.card_number or '' }}">

    <label>鑑定狀態</label>
    <select name="grade">
        <option value="PSA10" {% if card.grade == "PSA10" %}selected{% endif %}>PSA10</option>
        <option value="PSA9" {% if card.grade == "PSA9" %}selected{% endif %}>PSA9</option>
    </select>

    <h2>成本資料</h2>

    <label>購入日期</label>
    <input type="date" name="buy_date" value="{{ card.buy_date or '' }}">

    <label>購入價格</label>
    <input type="number" name="buy_price" step="1" value="{{ card.buy_price or 0 }}">

    <label>購入方式</label>
    <input type="text" name="purchase_method" placeholder="Line / FB / SNKRDUNK / 自送..." value="{{ card.purchase_method or '' }}">

    <h2>市價資料</h2>

    <label>目前市價</label>
    <input type="number" name="current_market_price" step="1" value="{{ card.current_market_price or 0 }}">

    <label>備註</label>
    <textarea name="note" rows="4">{{ card.note or '' }}</textarea>

    <button type="submit">儲存修改</button>

</form>

{% endblock %}
