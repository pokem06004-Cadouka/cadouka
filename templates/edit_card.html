{% extends "base.html" %}

{% block content %}

<a href="/cards/{{ card.id }}" class="back-link">← 回到卡牌明細</a>

<div class="form-page-header">
    <div>
        <p class="eyebrow">Edit Card</p>
        <h1>編輯卡牌</h1>
        <p class="page-subtitle">修改卡牌基本資料、購入價格、目前市價與商品網址。</p>
    </div>
</div>

<form action="/cards/{{ card.id }}/edit" method="post" class="form-card form-card-polished">

    <div class="form-section">
        <div class="form-section-title">
            <h2>基本資料</h2>
            <p>更新卡牌名稱、鑑定卡號與鑑定狀態。</p>
        </div>

        <div class="form-grid">
            <div class="form-field full">
                <label>卡牌名稱</label>
                <input
                    type="text"
                    name="card_name"
                    value="{{ card.card_name or '' }}"
                    required
                >
            </div>

            <div class="form-field">
                <label>鑑定卡號</label>
                <input
                    type="text"
                    name="card_number"
                    value="{{ card.card_number or '' }}"
                    placeholder="可選填"
                >
            </div>

            <div class="form-field">
                <label>鑑定狀態</label>
                <input
                    type="text"
                    name="grade"
                    value="{{ card.grade or '' }}"
                    placeholder="例如：PSA10 / PSA9"
                >
            </div>
        </div>
    </div>

    <div class="form-section">
        <div class="form-section-title">
            <h2>購入資料</h2>
            <p>如果修改購入價格，系統會重新計算損益與 ROI。</p>
        </div>

        <div class="form-grid">
            <div class="form-field">
                <label>購入日期</label>
                <input
                    type="date"
                    name="buy_date"
                    value="{{ card.buy_date or '' }}"
                >
            </div>

            <div class="form-field">
                <label>購入價格</label>
                <input
                    type="number"
                    name="buy_price"
                    step="1"
                    value="{{ card.buy_price or 0 }}"
                    placeholder="例如：12000"
                >
            </div>

            <div class="form-field full">
                <label>購入方式</label>
                <input
                    type="text"
                    name="purchase_method"
                    value="{{ card.purchase_method or '' }}"
                    placeholder="Line / SnkrDunk / 自送..."
                >
            </div>
        </div>
    </div>

    <div class="form-section">
        <div class="form-section-title">
            <h2>市價資料</h2>
            <p>持有中卡牌會用目前市價計算未實現損益。</p>
        </div>

        <div class="form-grid">
            <div class="form-field">
                <label>目前市價</label>
                <input
                    type="number"
                    name="current_market_price"
                    step="1"
                    value="{{ card.current_market_price or 0 }}"
                    placeholder="例如：15000"
                >
            </div>
        </div>
    </div>

    <div class="form-section">
        <div class="form-section-title">
            <h2>商品網址</h2>
            <p>可貼上 SNKRDUNK 商品網址，之後更新市價時會優先用這個網址更新。</p>
        </div>

        <div class="form-grid">
            <div class="form-field full">
                <label>商品網址</label>
                <input
                    type="url"
                    name="product_url"
                    value="{{ card.product_url or '' }}"
                    placeholder="可選填"
                >
            </div>
        </div>
    </div>

    <div class="form-section">
        <div class="form-section-title">
            <h2>備註</h2>
            <p>可以紀錄購買來源、賣家、特殊狀況或其他補充。</p>
        </div>

        <div class="form-grid">
            <div class="form-field full">
                <label>備註</label>
                <textarea
                    name="note"
                    rows="4"
                    placeholder="可選填"
                >{{ card.note or '' }}</textarea>
            </div>
        </div>
    </div>

    <div class="form-submit-row">
        <a href="/cards/{{ card.id }}" class="btn-secondary">取消</a>
        <button type="submit" class="btn-add form-submit-btn">儲存修改</button>
    </div>

</form>

{% endblock %}
