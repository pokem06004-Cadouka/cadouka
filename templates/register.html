{% extends "base.html" %}

{% block content %}

<div class="auth-page">

    <div class="auth-card">
        <div class="auth-header">
            <p class="eyebrow">Create Account</p>
            <h1>註冊 Cadouka</h1>
            <p class="page-subtitle">建立帳號後，你的卡牌資料會和其他使用者分開管理。</p>
        </div>

        <form action="/register" method="post" class="auth-form">

            <label>帳號</label>
            <input
                type="text"
                name="username"
                placeholder="請輸入帳號"
                required
            >

            <label>密碼</label>
            <input
                type="password"
                name="password"
                placeholder="請輸入密碼"
                required
            >

            <label>確認密碼</label>
            <input
                type="password"
                name="confirm_password"
                placeholder="請再次輸入密碼"
                required
            >

            <label class="legal-agree-checkbox">
                <input
                    type="checkbox"
                    name="agree_terms"
                    required
                    oninvalid="this.setCustomValidity('請先勾選同意服務條款與隱私權政策')"
                    oninput="this.setCustomValidity('')"
                >
                <span>
                    我已閱讀並同意
                    <a href="/terms" target="_blank" rel="noopener noreferrer">服務條款</a>
                    與
                    <a href="/privacy" target="_blank" rel="noopener noreferrer">隱私權政策</a>，
                    並了解
                    <a href="/disclaimer" target="_blank" rel="noopener noreferrer">免責聲明</a>。
                </span>
            </label>

            <button type="submit" class="btn-add auth-submit">
                註冊
            </button>

        </form>

        <div class="auth-footer">
            已經有帳號？
            <a href="/login">前往登入</a>
        </div>
    </div>

</div>

{% endblock %}
